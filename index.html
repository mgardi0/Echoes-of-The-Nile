<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOES OF THE NILE - TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* هێنانی فۆنتی مۆدێرن و تەکنیکی */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@300;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            overflow: hidden;
            margin: 0;
        }
        .tech-font {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* تێکەڵکردنی ڕەنگ بۆ دروستکردنی ستایلی تاریک و قوڵ */
        .cinematic-overlay {
            background: linear-gradient(90deg, rgba(4,9,20,0.95) 0%, rgba(4,9,20,0.6) 40%, transparent 100%),
                        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        /* جوڵەی نەرمی هاتنە ناوەوە بۆ دوگمەکان */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="relative h-screen w-screen text-white antialiased">

    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover z-0 filter brightness-75 contrast-125">
        <source src="Tiktok_1781225334230.mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 cinematic-overlay z-10 pointer-events-none"></div>

    <div class="relative z-20 flex flex-col justify-center h-full pl-12 md:pl-24 max-w-4xl">
        
        <div class="mb-12 fade-in-up" style="animation-delay: 0.1s;">
            <p class="tech-font text-cyan-500 text-xs tracking-[0.4em] mb-2 pl-1 uppercase">System Online // Version 2.0</p>
            <h1 class="text-6xl md:text-7xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-cyan-500/50">
                ECHOES
            </h1>
            <h2 class="text-2xl md:text-3xl font-light tracking-[0.5em] text-gray-400 mt-2">
                OF THE NILE
            </h2>
        </div>

        <div class="flex flex-col gap-3 w-80 md:w-96">
            
            <button class="group relative flex items-center justify-between px-6 py-3 bg-black/40 border-l-4 border-cyan-500 hover:bg-cyan-900/40 hover:border-cyan-300 transition-all backdrop-blur-sm fade-in-up" style="animation-delay: 0.2s;">
                <div class="flex flex-col items-start">
                    <span class="text-lg font-bold tracking-widest group-hover:text-cyan-300 transition-colors">INITIATE MISSION</span>
                    <span class="tech-font text-[10px] text-gray-500 group-hover:text-cyan-500 uppercase mt-1">Start Echo Sequence</span>
                </div>
                <span class="tech-font text-xs text-cyan-600 group-hover:text-cyan-300">[01]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-black/40 border-l-4 border-slate-700 hover:bg-slate-800/60 hover:border-white transition-all backdrop-blur-sm ml-2 fade-in-up" style="animation-delay: 0.3s;">
                <div class="flex flex-col items-start">
                    <span class="text-lg font-bold tracking-widest group-hover:text-white transition-colors">RE-SYNC CORE</span>
                    <span class="tech-font text-[10px] text-gray-500 group-hover:text-gray-300 uppercase mt-1">Establish New Timeline</span>
                </div>
                <span class="tech-font text-xs text-gray-600 group-hover:text-white">[02]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-black/40 border-l-4 border-slate-700 hover:bg-slate-800/60 hover:border-white transition-all backdrop-blur-sm ml-2 fade-in-up" style="animation-delay: 0.4s;">
                <div class="flex flex-col items-start">
                    <span class="text-lg font-bold tracking-widest group-hover:text-white transition-colors">RESTORE SESSION</span>
                    <span class="tech-font text-[10px] text-gray-500 group-hover:text-gray-300 uppercase mt-1">Access Saved Data</span>
                </div>
                <span class="tech-font text-xs text-gray-600 group-hover:text-white">[03]</span>
            </button>

            <div class="h-px w-full bg-gradient-to-r from-cyan-900/50 to-transparent my-2 fade-in-up" style="animation-delay: 0.5s;"></div>

            <button class="group relative flex items-center justify-between px-6 py-2 bg-black/20 hover:bg-black/60 border-l-2 border-transparent hover:border-gray-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.5s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-gray-300 group-hover:text-white">SYSTEM PROTOCOL</span>
                </div>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[04]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-2 bg-black/20 hover:bg-black/60 border-l-2 border-transparent hover:border-gray-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.6s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-gray-300 group-hover:text-white">LEGACY LOG</span>
                </div>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[05]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-2 bg-black/20 hover:bg-black/60 border-l-2 border-transparent hover:border-gray-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.7s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-gray-300 group-hover:text-white">AVATAR STATUS</span>
                </div>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[06]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-2 bg-black/20 hover:bg-black/60 border-l-2 border-transparent hover:border-gray-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.8s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-gray-300 group-hover:text-white">ARCHIVE CONTRIBUTORS</span>
                </div>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[07]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-2 mt-2 bg-red-950/20 hover:bg-red-900/40 border-l-2 border-red-900 hover:border-red-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.9s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-red-500/80 group-hover:text-red-400">TERMINATE SESSION</span>
                </div>
                <span class="tech-font text-[10px] text-red-900 group-hover:text-red-500">[08]</span>
            </button>

        </div>
        
        <div class="absolute bottom-8 left-12 flex gap-8 text-[9px] text-gray-600 tech-font uppercase tracking-widest fade-in-up" style="animation-delay: 1s;">
            <span>Server: LOCALHOST</span>
            <span class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-pulse"></div> Network Stable</span>
        </div>
        
    </div>

</body>
</html>
