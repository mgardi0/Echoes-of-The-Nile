<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOES OF THE NILE - TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="relative h-screen w-screen text-white antialiased">

    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover z-0 filter contrast-125 saturate-50">
        <source src="Tiktok_1781225334230.mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 blue-tint-overlay z-10 pointer-events-none"></div>

    <div class="wave-layer wave-1 z-10"></div>
    <div class="wave-layer wave-2 z-10"></div>

    <div class="absolute inset-0 bg-gradient-to-r from-slate-950/90 via-slate-900/40 to-transparent z-15 pointer-events-none"></div>

    <div class="relative z-20 flex flex-col justify-center h-full pl-12 md:pl-24 max-w-4xl">
        
        <div class="mb-12 fade-in-up" style="animation-delay: 0.1s;">
            <p class="tech-font text-cyan-500 text-xs tracking-[0.4em] mb-2 pl-1 uppercase">System Online // Version 2.0</p>
            <h1 class="text-6xl md:text-7xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-cyan-500/80 drop-shadow-[0_0_15px_rgba(0,255,255,0.3)]">
                ECHOES
            </h1>
            <h2 class="text-2xl md:text-3xl font-light tracking-[0.5em] text-cyan-100/70 mt-2">
                OF THE NILE
            </h2>
        </div>

        <div class="flex flex-col gap-3 w-80 md:w-96">
            <button class="group relative flex items-center justify-between px-6 py-3 bg-blue-950/20 border-l-4 border-cyan-400 hover:bg-cyan-900/40 hover:border-cyan-200 transition-all backdrop-blur-md fade-in-up overflow-hidden" style="animation-delay: 0.2s;">
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="flex flex-col items-start relative z-10">
                    <span class="text-lg font-bold tracking-widest group-hover:text-cyan-200 transition-colors drop-shadow-[0_0_8px_rgba(0,255,255,0.5)]">INITIATE MISSION</span>
                    <span class="tech-font text-[10px] text-cyan-500/70 group-hover:text-cyan-400 uppercase mt-1">Start Echo Sequence</span>
                </div>
                <span class="tech-font text-xs text-cyan-600 group-hover:text-cyan-300 relative z-10">[01]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-slate-900/40 border-l-4 border-slate-600 hover:bg-blue-900/30 hover:border-blue-400 transition-all backdrop-blur-md ml-2 fade-in-up" style="animation-delay: 0.3s;">
                <div class="flex flex-col items-start relative z-10">
                    <span class="text-lg font-bold tracking-widest text-gray-300 group-hover:text-blue-200 transition-colors">RE-SYNC CORE</span>
                    <span class="tech-font text-[10px] text-gray-500 group-hover:text-blue-400/80 uppercase mt-1">Establish New Timeline</span>
                </div>
                <span class="tech-font text-xs text-gray-600 group-hover:text-blue-400 relative z-10">[02]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-slate-900/40 border-l-4 border-slate-600 hover:bg-blue-900/30 hover:border-blue-400 transition-all backdrop-blur-md ml-2 fade-in-up" style="animation-delay: 0.4s;">
                <div class="flex flex-col items-start relative z-10">
                    <span class="text-lg font-bold tracking-widest text-gray-300 group-hover:text-blue-200 transition-colors">RESTORE SESSION</span>
                    <span class="tech-font text-[10px] text-gray-500 group-hover:text-blue-400/80 uppercase mt-1">Access Saved Data</span>
                </div>
                <span class="tech-font text-xs text-gray-600 group-hover:text-blue-400 relative z-10">[03]</span>
            </button>

            <div class="h-px w-full bg-gradient-to-r from-blue-900/60 to-transparent my-2 fade-in-up" style="animation-delay: 0.5s;"></div>

            <button class="group relative flex items-center justify-between px-6 py-2 bg-transparent hover:bg-white/5 border-l-2 border-transparent hover:border-gray-400 transition-all ml-4 fade-in-up" style="animation-delay: 0.5s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-gray-400 group-hover:text-gray-200">SYSTEM PROTOCOL</span>
                </div>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[04]</span>
            </button>
            
            <button class="group relative flex items-center justify-between px-6 py-2 bg-transparent hover:bg-white/5 border-l-2 border-transparent hover:border-gray-400 transition-all ml-4 fade-in-up" style="animation-delay: 0.6s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-gray-400 group-hover:text-gray-200">LEGACY LOG</span>
                </div>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[05]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-2 mt-2 bg-red-950/10 hover:bg-red-950/40 border-l-2 border-red-900/50 hover:border-red-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.7s;">
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold tracking-widest text-red-500/60 group-hover:text-red-400">TERMINATE SESSION</span>
                </div>
                <span class="tech-font text-[10px] text-red-900/50 group-hover:text-red-500">[06]</span>
            </button>
        </div>
        
        <div class="absolute bottom-8 left-12 flex gap-8 text-[9px] text-cyan-600/60 tech-font uppercase tracking-widest fade-in-up" style="animation-delay: 1s;">
            <span>Server: LOCALHOST</span>
            <span class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_8px_rgba(0,255,255,0.8)]"></div> Network Stable</span>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
