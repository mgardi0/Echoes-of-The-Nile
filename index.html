<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOES OF THE NILE - TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ئەم کۆدە لێوارەکانی ڤیدیۆکە دەتوێنێتەوە بۆ ناو باکگراوندە ڕەشەکە */
        .video-blend-overlay {
            background: 
                radial-gradient(ellipse at center, transparent 40%, #000 85%),
                linear-gradient(to bottom, #000 0%, transparent 10%, transparent 90%, #000 100%),
                linear-gradient(to right, #000 0%, transparent 15%, transparent 85%, #000 100%);
            mix-blend-mode: normal;
        }
    </style>
</head>
<body class="relative h-screen w-screen text-white antialiased bg-black overflow-hidden">

    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-contain z-0 filter contrast-125 saturate-50">
        <source src="Tiktok_1781225334230.mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 video-blend-overlay z-10 pointer-events-none"></div>

    <div class="absolute inset-0 blue-tint-overlay z-10 pointer-events-none opacity-80"></div>

    <div class="wave-layer wave-1 z-10"></div>
    <div class="wave-layer wave-2 z-10"></div>

    <div class="relative z-20 flex flex-col justify-center h-full pl-12 md:pl-24 max-w-4xl">
        
        <div class="mb-12 fade-in-up" style="animation-delay: 0.1s;">
            <h1 class="text-6xl md:text-7xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-cyan-500/80 drop-shadow-[0_0_15px_rgba(0,255,255,0.3)]">
                ECHOES
            </h1>
            <h2 class="text-2xl md:text-3xl font-light tracking-[0.5em] text-cyan-100/70 mt-2">
                OF THE NILE
            </h2>
        </div>

        <div class="flex flex-col gap-3 w-72 md:w-80">
            
            <button class="group relative flex items-center justify-between px-6 py-4 bg-blue-950/20 border-l-4 border-cyan-400 hover:bg-cyan-900/40 hover:border-cyan-200 transition-all backdrop-blur-md fade-in-up overflow-hidden" style="animation-delay: 0.2s;">
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <span class="text-xl font-bold tracking-widest text-white group-hover:text-cyan-200 transition-colors relative z-10 drop-shadow-[0_0_8px_rgba(0,255,255,0.5)]">START GAME</span>
                <span class="tech-font text-xs text-cyan-600/50 group-hover:text-cyan-300 relative z-10">[01]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-4 bg-slate-900/40 border-l-4 border-slate-600 hover:bg-blue-900/30 hover:border-blue-400 transition-all backdrop-blur-md ml-2 fade-in-up overflow-hidden" style="animation-delay: 0.3s;">
                <span class="text-xl font-bold tracking-widest text-gray-300 group-hover:text-white transition-colors relative z-10">NEW GAME</span>
                <span class="tech-font text-xs text-gray-600/50 group-hover:text-blue-400 relative z-10">[02]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-4 bg-slate-900/40 border-l-4 border-slate-600 hover:bg-blue-900/30 hover:border-blue-400 transition-all backdrop-blur-md ml-2 fade-in-up overflow-hidden" style="animation-delay: 0.4s;">
                <span class="text-xl font-bold tracking-widest text-gray-300 group-hover:text-white transition-colors relative z-10">LOAD GAME</span>
                <span class="tech-font text-xs text-gray-600/50 group-hover:text-blue-400 relative z-10">[03]</span>
            </button>

            <div class="h-px w-full bg-gradient-to-r from-blue-900/60 to-transparent my-2 fade-in-up" style="animation-delay: 0.5s;"></div>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-transparent hover:bg-white/5 border-l-2 border-transparent hover:border-gray-400 transition-all ml-4 fade-in-up" style="animation-delay: 0.5s;">
                <span class="text-sm font-bold tracking-widest text-gray-400 group-hover:text-gray-200">SETTINGS</span>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[04]</span>
            </button>
            
            <button class="group relative flex items-center justify-between px-6 py-3 bg-transparent hover:bg-white/5 border-l-2 border-transparent hover:border-gray-400 transition-all ml-4 fade-in-up" style="animation-delay: 0.6s;">
                <span class="text-sm font-bold tracking-widest text-gray-400 group-hover:text-gray-200">ACHIEVEMENTS</span>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[05]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-transparent hover:bg-white/5 border-l-2 border-transparent hover:border-gray-400 transition-all ml-4 fade-in-up" style="animation-delay: 0.7s;">
                <span class="text-sm font-bold tracking-widest text-gray-400 group-hover:text-gray-200">CHARACTER</span>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[06]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 bg-transparent hover:bg-white/5 border-l-2 border-transparent hover:border-gray-400 transition-all ml-4 fade-in-up" style="animation-delay: 0.8s;">
                <span class="text-sm font-bold tracking-widest text-gray-400 group-hover:text-gray-200">CREDITS</span>
                <span class="tech-font text-[10px] text-gray-600 group-hover:text-gray-400">[07]</span>
            </button>

            <button class="group relative flex items-center justify-between px-6 py-3 mt-2 bg-red-950/10 hover:bg-red-950/40 border-l-2 border-red-900/50 hover:border-red-500 transition-all ml-4 fade-in-up" style="animation-delay: 0.9s;">
                <span class="text-sm font-bold tracking-widest text-red-500/60 group-hover:text-red-400">QUIT</span>
                <span class="tech-font text-[10px] text-red-900/50 group-hover:text-red-500">[08]</span>
            </button>

        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
